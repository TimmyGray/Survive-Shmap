name: PR Review Checks

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  local-pr-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure base branch ref is available
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Run PR review script
        env:
          AI_REVIEW_PROVIDER: none
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openai/gpt-4o-mini
          OPENROUTER_SITE_URL: ${{ github.server_url }}/${{ github.repository }}
          OPENROUTER_SITE_NAME: survive-shmap-pr-review
        run: ./scripts/local_pr_review.sh "origin/${{ github.base_ref }}"
